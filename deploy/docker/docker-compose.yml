version: "3.9"

# ================================
# PUDIWIND AI System — Docker Compose 生产配置
# 包含服务：app（FastAPI）+ postgres（pgvector）+ frontend（Next.js）+ nginx（反向代理）
# ================================

services:
  # ---- FastAPI 后端服务 ----
  app:
    build:
      context: ../..  # 项目根目录
      dockerfile: deploy/docker/Dockerfile
    image: amazon-ai-app:latest
    container_name: amazon-ai-app
    restart: unless-stopped

    ports:
      - "127.0.0.1:8000:8000"

    env_file:
      - ../../.env

    environment:
      - DATABASE_URL=postgresql://app_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/amazon_ai
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    networks:
      - internal

    volumes:
      - app_logs:/app/logs

  # ---- Next.js 前端服务 ----
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    image: amazon-ai-frontend:latest
    container_name: amazon-ai-frontend
    restart: unless-stopped

    ports:
      - "127.0.0.1:3000:3000"

    environment:
      - NEXT_PUBLIC_API_URL=

    depends_on:
      - app

    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - internal

  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:1.25-alpine
    container_name: amazon-ai-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

    depends_on:
      - app
      - frontend

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - internal

  # ---- 数据库服务（带 pgvector 扩展）----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: amazon-ai-postgres
    restart: unless-stopped

    # 不映射宿主机端口 — 仅通过内部网络访问
    environment:
      - POSTGRES_DB=amazon_ai
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d amazon_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - internal

    volumes:
      - postgres_data:/var/lib/postgresql/data

# ---- 网络配置 ----
networks:
  internal:
    driver: bridge

# ---- 数据卷配置 ----
volumes:
  postgres_data:
    driver: local
    name: amazon-ai-postgres-data

  app_logs:
    driver: local
    name: amazon-ai-app-logs

  certbot_conf:
    driver: local
    name: amazon-ai-certbot-conf

  certbot_www:
    driver: local
    name: amazon-ai-certbot-www
