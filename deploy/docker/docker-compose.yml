version: "3.9"

# ================================
# PUDIWIND AI System — Docker Compose 生产配置
# 包含服务：app（FastAPI）+ postgres（pgvector）
# 注意：postgres 仅通过内部网络访问，不映射宿主机端口
# ================================

services:
  # ---- 主应用服务 ----
  app:
    build:
      context: ../..  # 项目根目录
      dockerfile: deploy/docker/Dockerfile
    image: amazon-ai-app:latest
    container_name: amazon-ai-app
    restart: unless-stopped

    # 端口映射：宿主机 8000 → 容器 8000（nginx 反向代理到此）
    ports:
      - "127.0.0.1:8000:8000"  # 仅绑定本地回环，不直接对外暴露

    # 挂载 .env 文件（敏感配置不写入镜像）
    env_file:
      - ../../.env

    # 覆盖 .env 中的数据库连接（使用 Docker 内部网络域名 postgres）
    environment:
      - DATABASE_URL=postgresql://app_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/amazon_ai
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    # 等待 postgres 健康后再启动 app
    depends_on:
      postgres:
        condition: service_healthy

    # 资源限制：最大 2GB 内存，防止 OOM 影响宿主机
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

    # 日志配置：限制日志文件大小，避免磁盘撑爆
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    networks:
      - internal

    volumes:
      - app_logs:/app/logs

  # ---- 数据库服务（带 pgvector 扩展）----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: amazon-ai-postgres
    restart: unless-stopped

    # ⚠️ 重要安全设计：不映射宿主机端口！
    # postgres 5432 端口仅在 Docker 内部网络对 app 可见
    # 宿主机无法直接连接数据库，防止数据库暴露到公网
    # ports:  ← 故意注释掉，不暴露宿主机端口

    environment:
      - POSTGRES_DB=amazon_ai
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata

    # 健康检查：确保 postgres 真正可接受连接后才启动 app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d amazon_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # 资源限制：最大 1GB 内存
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - internal

    # 持久化数据库数据
    volumes:
      - postgres_data:/var/lib/postgresql/data

# ---- 网络配置 ----
networks:
  internal:
    driver: bridge
    # internal: true  # 若需完全隔断外网，取消注释（会导致 app 无法访问外部 API）

# ---- 数据卷配置 ----
volumes:
  postgres_data:
    driver: local
    name: amazon-ai-postgres-data

  app_logs:
    driver: local
    name: amazon-ai-app-logs
