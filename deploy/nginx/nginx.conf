# ================================
# PUDIWIND AI System — Nginx 反向代理配置
# 功能：HTTP→HTTPS重定向 + 反向代理到 app:8000 + WebSocket支持
# SSL证书由 Let's Encrypt 提供（certbot 获取）
# ================================

# 全局配置
user nginx;
worker_processes auto;  # 自动根据 CPU 核数设置工作进程数
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;  # 每个工作进程最大并发连接数
    use epoll;                # Linux 高性能事件模型
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # 客户端请求体大小限制（飞书 webhook 消息通常较小）
    client_max_body_size 10m;

    # 上游服务器（Docker 内部网络中的 app 服务）
    upstream amazon_ai_app {
        server app:8000;          # Docker Compose 服务名，内部网络直连
        keepalive 32;             # 保持长连接，减少 TCP 握手开销
    }

    # ----------------------------------------------------------------
    # Server 1：HTTP → HTTPS 重定向（80端口）
    # ----------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name your-domain.com www.your-domain.com;  # ← 替换为你的域名

        # Let's Encrypt 证书验证（certbot 需要访问这个路径）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他所有请求重定向到 HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ----------------------------------------------------------------
    # Server 2：HTTPS 主服务（443端口）
    # ----------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name your-domain.com www.your-domain.com;  # ← 替换为你的域名

        # ---- SSL 证书配置（Let's Encrypt 占位符）----
        # 使用 certbot 获取证书后，路径会自动填入：
        # sudo certbot --nginx -d your-domain.com
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

        # SSL 安全配置（现代浏览器兼容）
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS（告诉浏览器只通过 HTTPS 访问，有效期1年）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        # ---- 反向代理到 FastAPI 应用 ----
        location / {
            proxy_pass http://amazon_ai_app;

            # 传递客户端信息头（应用需要知道真实 IP）
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置（飞书 webhook 处理可能需要几秒）
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---- 飞书 Webhook 路径（支持 WebSocket 升级）----
        # 飞书的卡片回调可能使用 WebSocket 连接
        location /feishu/ {
            proxy_pass http://amazon_ai_app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 升级支持（飞书实时通信需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket 长连接超时（飞书连接可能保持较长时间）
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ---- 健康检查端点（不记录访问日志，减少噪音）----
        location /health {
            proxy_pass http://amazon_ai_app;
            access_log off;  # 健康检查频繁，不记录日志
        }

        # ---- 静态文件缓存（如果有）----
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            proxy_pass http://amazon_ai_app;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
