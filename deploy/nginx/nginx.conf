# ================================
# PUDIWIND AI System — Nginx 反向代理配置
# 功能：反向代理到 FastAPI + Next.js
# 阶段 1：HTTP 模式（无 SSL）— DNS 配好后启用 SSL
# ================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    client_max_body_size 10m;

    # ---- 上游服务器 ----
    upstream api {
        server app:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ----------------------------------------------------------------
    # HTTP 服务（80端口）— DNS 未配置前先用 HTTP
    # ----------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name siqiangshangwu.com www.siqiangshangwu.com _;

        # Let's Encrypt 证书验证（预留）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ---- API 路由 → FastAPI 后端 ----
        location /api/ {
            proxy_pass http://api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ---- 飞书 Webhook 路由 → FastAPI ----
        location /feishu/ {
            proxy_pass http://api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ---- 健康检查 → FastAPI ----
        location /health {
            proxy_pass http://api;
            access_log off;
        }

        # ---- OpenAPI 文档 → FastAPI ----
        location /docs {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        # ---- Next.js 静态资源（长缓存）----
        location /_next/static/ {
            proxy_pass http://frontend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # ---- 所有其他请求 → Next.js 前端 ----
        location / {
            proxy_pass http://frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ----------------------------------------------------------------
    # HTTPS 服务（443端口）— DNS 配好 + SSL 证书申请后取消注释
    # 启用方法：替换本文件为 nginx-ssl.conf
    # ----------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name siqiangshangwu.com www.siqiangshangwu.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/siqiangshangwu.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/siqiangshangwu.com/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Frame-Options DENY;
    #     add_header X-Content-Type-Options nosniff;
    #
    #     # (同 HTTP 块的 location 规则)
    # }
}
